# fly.toml app configuration file generated for perpspad-keeper on 2026-06-28T13:19:53+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'perpspad-keeper'
primary_region = 'iad'

[build]

[env]
  LOOP_INTERVAL_MS = '15000'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
