# Fly.io config for the perpspad Drift keeper.
# Run `fly launch --copy-config --no-deploy` from the keeper/ directory the
# first time. Then `fly secrets set ...` and `fly deploy`.

app = "perpspad-keeper"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  LOOP_INTERVAL_MS = "15000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
